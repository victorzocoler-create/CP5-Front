<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CP5 - Seções 4 e 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ==================== SEÇÃO 4 - CARTAS ==================== -->
<section id="cartas">
  <h2>Crie sua<br>própria carta<br>especial</h2>

  <div class="cartas-container">

    <!-- FORMULÁRIO -->
    <div class="cartas-form">
      <div class="form-grid">

        <div class="form-group">
          <label for="nomeCarta">Nome da carta:</label>
          <input type="text" id="nomeCarta" />
        </div>

        <div class="form-group">
          <label for="vida">Quantidade de vida:</label>
          <input type="number" id="vida" />
        </div>

        <div class="form-group">
          <label for="pokemon">Pokemon:</label>
          <div class="select-wrapper">
            <select id="pokemon">
              <option value="">Selecione o pokemon</option>
              <option value="bulbasaur">Bulbasaur</option>
              <option value="charmander">Charmander</option>
              <option value="squirtle">Squirtle</option>
              <option value="pikachu">Pikachu</option>
              <option value="eevee">Eevee</option>
              <option value="snorlax">Snorlax</option>
              <option value="mewtwo">Mewtwo</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="ataque">Ataque:</label>
          <input type="text" id="ataque" />
        </div>

        <div class="form-group">
          <label for="categoria">Categoria:</label>
          <div class="select-wrapper">
            <select id="categoria">
              <option value="">Selecione a categoria</option>
              <option value="Água">Água</option>
              <option value="Fogo">Fogo</option>
              <option value="Planta">Planta</option>
              <option value="Elétrico">Elétrico</option>
              <option value="Gelo">Gelo</option>
              <option value="Normal">Normal</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="resistencia">Resistência:</label>
          <input type="text" id="resistencia" />
        </div>

      </div>

      <button class="btn-enviar" onclick="atualizarCarta()">Enviar</button>
    </div>

   
    <div class="card-preview">
      <div class="pokemon-card" id="pokemonCard">
        <img src="images/card.png" alt="Card Pokemon" class="card-img-base" />
        <span class="card-overlay-name"  id="cardName">???</span>
        <span class="card-overlay-hp"    id="cardHp">—</span>
        <span class="card-overlay-tipo"  id="cardCategoria">Tipo: —</span>
        <span class="card-overlay-ataque" id="cardAtaque">—</span>
        <span class="card-overlay-resistencia" id="cardResistencia">—</span>

      </div>
    </div>

  </div>
</section>

<!-- ==================== SEÇÃO 5 - FOOTER ==================== -->
<footer id="footer">
  <img src="images/footer-banner.jpg" alt="Banner Footer" class="footer-banner" />
  <div class="footer-content">
    <h2 class="footer-title">Explore e divirta-se</h2>
    <div class="footer-info">
      <div class="footer-block">
        <p>1º ano - Engenharia de Software</p>
        <p>FIAP - Paulista</p>
        <p>São Paulo - SP</p>
      </div>
      <div class="footer-block">
        <p>Telefone: (12) 3456-7890</p>
        <p>E-mail: checkpoint@fiap.com.br</p>
        <p>Redes sociais: @checkpoint</p>
      </div>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
